<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windgap Academy - Three.js Character System</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .app-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 1rem;
      background-color: #f0f0f0;
      border-radius: 8px;
      border-bottom: 3px solid #3b82f6;
    }
    
    .app-header h1 {
      margin: 0;
      color: #1f2937;
      font-size: 2.5rem;
    }
    
    .app-header p {
      margin-top: 0.5rem;
      color: #4b5563;
      font-size: 1.25rem;
    }
    
    .app-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    
    .demo-section {
      background-color: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .demo-section h2 {
      margin-top: 0;
      color: #1f2937;
      font-size: 1.8rem;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 0.5rem;
    }
    
    .demo-container {
      margin-top: 1.5rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .comparison-table {
      margin-top: 1.5rem;
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    
    th {
      background-color: #f3f4f6;
      font-weight: 600;
      color: #1f2937;
    }
    
    tr:hover {
      background-color: #f9fafb;
    }
    
    .app-footer {
      margin-top: 3rem;
      text-align: center;
      padding: 1.5rem;
      background-color: #f3f4f6;
      border-radius: 8px;
      color: #6b7280;
    }
    
    @media (max-width: 768px) {
      .app-container {
        padding: 16px;
      }
      
      .app-header h1 {
        font-size: 2rem;
      }
      
      .demo-section {
        padding: 1rem;
      }
    }
  </style>
  <!-- Import styles -->
  <link rel="stylesheet" href="src/styles/animations.css">
</head>
<body>
  <div id="root"></div>
  
  <!-- Scripts -->
  <script type="module">
    // Import Three.js
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    
    // Make THREE available globally for our components
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.GLTFLoader = GLTFLoader;
    
    // Import React
    import React from 'https://cdn.jsdelivr.net/npm/react@18.2.0/+esm';
    import ReactDOM from 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm';
    import { motion, AnimatePresence } from 'https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/+esm';
    
    // Import our example
    import App from './src/examples/ThreeJsExample.jsx';
    
    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
