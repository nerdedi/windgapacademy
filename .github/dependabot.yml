version: 2
updates:
  # npm dependencies for root directory
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "automation"
    
  # npm dependencies for backend directory
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "backend"
      - "automation"
    
  # npm dependencies for mcp-server directory (when it exists)
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "mcp-server"
      - "automation"
    
  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "github-actions"
      - "automation"
    
  # Docker dependencies for root Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "docker"
      - "automation"
    
  # Docker dependencies for .devcontainer
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    assignees:
      - "nerdedi"
    reviewers:
      - "nerdedi"
    labels:
      - "dependencies"
      - "devcontainer"
      - "automation"